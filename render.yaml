services:
  - type: web
    name: psyche-deep-openai
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_STORE
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
