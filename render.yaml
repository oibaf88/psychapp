services:
  - type: web
    name: psychapp
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /psychapp/api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_BASE_PATH
        value: /psychapp
      - key: PUBLIC_BASE_URL
        value: https://ondender.com/psychapp
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_API_KEY
        sync: false
      - key: OAUTH_COOKIE_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
